name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check app/ tests/ evals/

      - name: Lint
        run: ruff check app/ tests/ evals/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: opsagent
          POSTGRES_PASSWORD: opsagent
          POSTGRES_DB: opsagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://opsagent:opsagent@localhost:5432/opsagent
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  eval:
    name: Eval suite
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: opsagent
          POSTGRES_PASSWORD: opsagent
          POSTGRES_DB: opsagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://opsagent:opsagent@localhost:5432/opsagent
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run detection eval (blocks on failure)
        run: python -m pytest evals/eval_detection.py -v --tb=short

      - name: Run system eval (blocks on failure)
        run: python -m pytest evals/eval_system.py -v --tb=short

      - name: Run agent eval (blocks on failure)
        run: python -m pytest evals/eval_agent.py -v --tb=short
